<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus AI | Knowledge OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .glass {
        background: rgba(23, 23, 23, 0.8);
        backdrop-filter: blur(16px);
      }
      .chat-gradient {
        background: radial-gradient(circle at bottom, #1a1a1a 0%, #0a0a0a 100%);
      }
      /* Sidebar Mobile Logic */
      @media (max-width: 768px) {
        .sidebar-closed {
          transform: translateX(-100%);
        }
        .sidebar-open {
          transform: translateX(0);
        }
        .overlay-active {
          display: block !important;
        }
      }
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 10px;
      }
      .markdown-content p {
        margin-bottom: 0.75rem;
      }
      .markdown-content ol {
        list-style-type: decimal;
        margin-left: 1.5rem;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body class="bg-[#0a0a0a] text-zinc-200 overflow-hidden">
    <div
      id="sidebarOverlay"
      onclick="toggleSidebar()"
      class="fixed inset-0 bg-black/60 z-20 hidden backdrop-blur-sm transition-opacity"
    ></div>

    <div class="flex h-screen w-full relative">
      <aside
        id="sidebar"
        class="fixed inset-y-0 left-0 z-30 w-72 flex flex-col border-r border-white/5 bg-[#0d0d0d] transition-transform duration-300 ease-in-out md:relative md:translate-x-0 sidebar-closed"
      >
        <div class="p-6">
          <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
              <div
                class="w-8 h-8 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-lg flex items-center justify-center"
              >
                <i class="fa-solid fa-bolt text-white text-sm"></i>
              </div>
              <span class="font-bold text-lg tracking-tight text-white"
                >Nexus RAG</span
              >
            </div>
            <button
              onclick="toggleSidebar()"
              class="md:hidden text-zinc-400 p-2"
            >
              <i class="fa-solid fa-xmark"></i>
            </button>
          </div>

          <button
            onclick="document.getElementById('fileInput').click()"
            class="group w-full flex items-center justify-between gap-2 bg-white text-black font-medium py-2.5 px-4 rounded-xl hover:bg-zinc-200 transition-all active:scale-[0.98]"
          >
            <span>New Upload</span>
            <i
              class="fa-solid fa-plus text-xs group-hover:rotate-90 transition-transform"
            ></i>
          </button>
          <input
            type="file"
            id="fileInput"
            class="hidden"
            accept=".pdf"
            onchange="uploadPDF()"
          />
        </div>

        <nav class="flex-1 px-4 overflow-y-auto space-y-6">
          <div>
            <h3
              class="px-2 text-[11px] font-bold text-zinc-500 uppercase tracking-widest mb-3"
            >
              Knowledge Base
            </h3>
            <div id="documentList" class="space-y-1">
              <div
                id="empty-docs"
                class="px-2 py-4 border border-dashed border-white/10 rounded-xl text-center"
              >
                <p class="text-xs text-zinc-500">No documents indexed yet.</p>
              </div>
            </div>
          </div>
        </nav>

        <div class="p-4 border-t border-white/5 bg-black/20">
          <div class="flex items-center gap-3 px-2 py-3">
            <div
              class="w-8 h-8 rounded-full bg-gradient-to-br from-zinc-700 to-zinc-900 border border-white/10"
            ></div>
            <div class="text-sm">
              <p class="font-medium text-white">Pro Plan</p>
              <p class="text-xs text-zinc-500 text-nowrap">v4.0-mini Active</p>
            </div>
          </div>
        </div>
      </aside>

      <main
        class="flex-1 flex flex-col chat-gradient relative w-full overflow-hidden"
      >
        <header
          class="h-16 flex items-center justify-between px-4 md:px-8 glass border-b border-white/5 z-10"
        >
          <div class="flex items-center gap-3">
            <button
              onclick="toggleSidebar()"
              class="md:hidden text-zinc-400 p-2 -ml-2"
            >
              <i class="fa-solid fa-bars-staggered text-lg"></i>
            </button>
            <div class="flex items-center gap-2">
              <span
                class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)]"
              ></span>
              <span class="text-xs font-medium text-zinc-400 hidden sm:inline"
                >System Ready</span
              >
            </div>
          </div>
          <div class="flex items-center gap-2 md:gap-4">
            <button class="text-zinc-400 hover:text-white p-2 transition">
              <i class="fa-solid fa-share-nodes"></i>
            </button>
            <button class="text-zinc-400 hover:text-white p-2 transition">
              <i class="fa-solid fa-gear"></i>
            </button>
          </div>
        </header>

        <div id="chat-container" class="flex-1 overflow-y-auto px-4 py-6">
          <div class="max-w-3xl mx-auto space-y-6 md:space-y-8">
            <div id="welcome-screen" class="text-center py-12 md:py-20">
              <h1
                class="text-2xl md:text-4xl font-bold text-white mb-4 tracking-tight"
              >
                What would you like to know?
              </h1>
              <p
                class="text-zinc-400 max-w-sm md:max-w-md mx-auto leading-relaxed text-sm md:text-base"
              >
                Upload your documents to the knowledge base and I'll help you
                extract insights instantly.
              </p>
            </div>
          </div>
        </div>

        <div
          class="p-4 md:p-6 bg-gradient-to-t from-[#0a0a0a] via-[#0a0a0a] to-transparent"
        >
          <div class="max-w-3xl mx-auto relative group">
            <div
              class="absolute -inset-0.5 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-2xl blur opacity-10 group-focus-within:opacity-25 transition duration-500"
            ></div>
            <div
              class="relative bg-[#1a1a1a] border border-white/10 rounded-2xl p-2 shadow-2xl"
            >
              <textarea
                id="userInput"
                rows="1"
                class="w-full bg-transparent border-none focus:ring-0 text-white placeholder-zinc-500 py-3 px-4 resize-none max-h-40 text-sm md:text-base"
                placeholder="Ask anything..."
              ></textarea>

              <div class="flex items-center justify-between px-2 pb-1">
                <div class="flex gap-1 md:gap-2 text-zinc-500">
                  <button class="hover:text-zinc-300 p-2 rounded-lg transition">
                    <i class="fa-solid fa-paperclip"></i>
                  </button>
                  <button class="hover:text-zinc-300 p-2 rounded-lg transition">
                    <i class="fa-solid fa-microphone"></i>
                  </button>
                </div>
                <button
                  id="sendBtn"
                  class="bg-indigo-600 hover:bg-indigo-500 text-white w-9 h-9 md:w-10 md:h-10 rounded-xl flex items-center justify-center transition-all active:scale-90 shadow-lg shadow-indigo-500/20"
                >
                  <i class="fa-solid fa-arrow-up text-sm"></i>
                </button>
              </div>
            </div>
            <p
              class="text-center text-[9px] md:text-[10px] text-zinc-600 mt-4 tracking-wide uppercase hidden sm:block"
            >
              Enterprise Grade Security &bull; SOC2 Compliant &bull; 256-bit
              Encryption
            </p>
          </div>
        </div>
      </main>
    </div>

    <script>
      // Sidebar Toggle Logic
      function toggleSidebar() {
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("sidebarOverlay");

        sidebar.classList.toggle("sidebar-open");
        sidebar.classList.toggle("sidebar-closed");
        overlay.classList.toggle("overlay-active");
      }

      // Auto-expand textarea
      const tx = document.getElementsByTagName("textarea");
      for (let i = 0; i < tx.length; i++) {
        tx[i].setAttribute(
          "style",
          "height:" + tx[i].scrollHeight + "px;overflow-y:hidden;",
        );
        tx[i].addEventListener("input", OnInput, false);
      }
      function OnInput() {
        this.style.height = 0;
        this.style.height = this.scrollHeight + "px";
      }
    </script>
    <script src="/static/js/chat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </body>
</html>
